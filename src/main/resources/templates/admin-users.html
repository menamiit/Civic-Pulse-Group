<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profiles</title>
    <style>
        :root {
            --bg: #f7f7fa;
            --ink: #22223b;
            --muted: #54546b;
            --brand: #355070;
            --surface: #ffffff;
            --warn: #e76f51;
        }
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            margin: 0;
            background: linear-gradient(160deg, #eef0f8 0%, var(--bg) 65%);
            color: var(--ink);
        }
        .layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
        .sidebar {
            background: #2b2442;
            color: #ece7fb;
            padding: 20px 14px;
        }
        .brand { font-size: 18px; font-weight: 700; margin-bottom: 20px; padding: 0 10px; }
        .nav-link {
            display: block;
            color: #ece7fb;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .nav-link.active,
        .nav-link:hover { background: #463a67; }
        .logout-btn {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #625783;
            background: transparent;
            color: #ece7fb;
            cursor: pointer;
        }
        .content { padding: 20px 16px 40px; }
        .wrap { max-width: 1180px; }
        .title { font-size: 30px; font-weight: 700; }
        .subtitle { color: var(--muted); margin-top: 4px; }
        .card {
            border: 1px solid #d9deee;
            border-radius: 14px;
            padding: 16px;
            margin-top: 14px;
            background: var(--surface);
        }
        .kpi { font-size: 28px; font-weight: 700; margin-top: 8px; color: var(--warn); }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { border: 1px solid #d8dfef; padding: 8px; text-align: left; }
        th { background: #f3f5fb; }
        button {
            padding: 8px;
            border-radius: 10px;
            border: none;
            background: var(--brand);
            color: #fff;
            cursor: pointer;
        }
        @media (max-width: 980px) {
            .layout { grid-template-columns: 1fr; }
            table { font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">Civic Pulse</div>
        <a class="nav-link" href="/admin/home">Dashboard</a>
        <a class="nav-link" href="/admin/grievances">All Grievances</a>
        <a class="nav-link" href="/admin/grievances/manage">Assign & Deadlines</a>
        <a class="nav-link active" href="/admin/users">User Profiles</a>
        <a class="nav-link" href="/profile">Profile</a>
        <form method="post" action="/logout">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="logout-btn" type="submit">Logout</button>
        </form>
    </aside>

    <main class="content">
        <div class="wrap">
            <div class="title">User Profiles</div>
            <div class="subtitle">Welcome, <strong th:text="${username}">admin</strong>. Review account details and approvals.</div>

            <div class="card">
                <div>Pending Officer Verification</div>
                <div class="kpi" th:text="${pendingOfficerVerification}">0</div>
            </div>

            <div class="card">
                <h3>All User Profiles</h3>
                <table>
                    <thead>
                    <tr><th>Username</th><th>Email</th><th>Role</th><th>Department</th><th>Verified</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.username}">username</td>
                        <td th:text="${u.email}">email</td>
                        <td th:text="${u.role}">role</td>
                        <td th:text="${u.department != null ? #strings.replace(u.department.name(), '_', ' ') : '-'}">-</td>
                        <td th:text="${u.verified ? 'Yes' : 'No'}">Yes</td>
                        <td>
                            <form th:if="${u.role.name() == 'OFFICER' and !u.verified}" th:action="@{'/admin/users/' + ${u.id} + '/verify-officer'}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit">Verify Officer</button>
                            </form>
                            <span th:if="${u.role.name() != 'OFFICER' or u.verified}">-</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
