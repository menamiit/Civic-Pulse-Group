<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        input, textarea, button { width: 100%; padding: 8px; margin-top: 8px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    </style>
</head>
<body>
<h2>Citizen Dashboard</h2>
<form method="post" action="/logout" style="max-width: 140px;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit">Logout</button>
</form>

<div class="card">
    <h3>File a Grievance</h3>
    <form method="post" action="/citizen/grievances">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Title</label>
        <input name="title" required />
        <label>Description</label>
        <textarea name="description" rows="4" required></textarea>
        <button type="submit">Submit</button>
    </form>
</div>

<div class="card">
    <h3>My Grievances</h3>
    <div th:if="${#lists.isEmpty(grievances)}">No grievances filed yet.</div>
    <div th:each="g : ${grievances}" class="card">
        <div><strong th:text="${g.title}">Title</strong></div>
        <div th:text="${g.description}">Description</div>
        <div>Status: <span th:text="${g.status}">NEW</span></div>
        <div>Assigned Officer: <span th:text="${g.assignedOfficer != null ? g.assignedOfficer.username : 'Not assigned'}">Not assigned</span></div>
    </div>
</div>
</body>
</html>
