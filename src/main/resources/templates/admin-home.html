<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        select, button { padding: 8px; margin-top: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
<h2>Admin Dashboard</h2>
<form method="post" action="/logout" style="max-width: 140px;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit">Logout</button>
</form>

<div class="card">
    <h3>All Grievances (Assign to Officer)</h3>
    <div th:if="${#lists.isEmpty(grievances)}">No grievances yet.</div>
    <div th:each="g : ${grievances}" class="card">
        <div><strong th:text="${g.title}">Title</strong> - <span th:text="${g.status}">NEW</span></div>
        <div>Citizen: <span th:text="${g.citizen.username}">citizen</span></div>
        <div>Assigned Officer: <span th:text="${g.assignedOfficer != null ? g.assignedOfficer.username : 'Not assigned'}">Not assigned</span></div>
        <form th:action="@{'/admin/grievances/' + ${g.id} + '/assign'}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label>Assign Officer</label>
            <select name="officerId" required>
                <option value="" disabled selected>Select officer</option>
                <option th:each="o : ${officers}" th:value="${o.id}" th:text="${o.username}"></option>
            </select>
            <button type="submit">Assign</button>
        </form>
    </div>
</div>

<div class="card">
    <h3>All Users</h3>
    <table>
        <thead>
        <tr><th>Username</th><th>Email</th><th>Role</th><th>Verified</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.username}">username</td>
            <td th:text="${u.email}">email</td>
            <td th:text="${u.role}">role</td>
            <td th:text="${u.verified ? 'Yes' : 'No'}">Yes</td>
            <td>
                <form th:if="${u.role.name() == 'OFFICER' and !u.verified}" th:action="@{'/admin/users/' + ${u.id} + '/verify-officer'}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit">Verify Officer</button>
                </form>
                <span th:if="${u.role.name() != 'OFFICER' or u.verified}">-</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
